<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="icono.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Alegría</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; height: 100vh; overflow: hidden; }

        #pantalla-bloqueo { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1e293b; color: white; }
        #panel-contenido { display: none; height: 100vh; width: 100vw; display: flex; }

        .sidebar-usuarios { width: 350px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .sidebar-header h2 { font-size: 1.2rem; color: #0f172a; margin-bottom: 10px; }
        .buscador-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .lista-usuarios-contenedor { flex: 1; overflow-y: auto; }
        
        .usuario-card { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.2s; }
        .usuario-card:hover { background: #f8fafc; }
        .usuario-card.activo { background: #eff6ff; border-left: 4px solid #3b82f6; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #3b82f6; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; font-size: 1.2rem; object-fit: cover; }
        .user-info h4 { font-size: 1rem; color: #0f172a; margin-bottom: 3px; word-break: break-all; }
        .user-info p { font-size: 0.8rem; color: #64748b; word-break: break-all; }

        .main-panel { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; overflow-y: auto; position: relative; }
        .estado-vacio { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #64748b; }
        .estado-vacio span { font-size: 4rem; margin-bottom: 15px; }

        #detalle-paciente { display: none; padding: 30px; max-width: 900px; margin: 0 auto; width: 100%; }
        .paciente-header { display: flex; align-items: center; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .paciente-header img { width: 80px; height: 80px; border-radius: 50%; margin-right: 20px; object-fit: cover; background: #cbd5e1; }
        
        .tabs-menu { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; font-weight: bold; color: #64748b; border-radius: 8px; transition: 0.3s; font-size: 0.95rem; }
        .tab-btn:hover:not(.activo) { background: #e2e8f0; }
        .tab-btn.activo { background: #3b82f6; color: white; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.activo { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .resumen-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; }
        .resumen-card h3 { font-size: 0.9rem; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
        .resumen-card .valor { font-size: 1.4rem; font-weight: bold; color: #0f172a; }

        .timeline-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .timeline-item { position: relative; padding-left: 30px; margin-bottom: 25px; }
        .timeline-item::before { content: ''; position: absolute; left: 0; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: #3b82f6; border: 3px solid #eff6ff; }
        .timeline-item::after { content: ''; position: absolute; left: 5px; top: 20px; bottom: -20px; width: 2px; background: #e2e8f0; }
        .timeline-item:last-child::after { display: none; }
        .timeline-fecha { font-size: 0.8rem; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .timeline-contenido { background: #f8fafc; padding: 15px; border-radius: 8px; color: #334155; font-size: 0.95rem; white-space: pre-wrap; border: 1px solid #e2e8f0; }
        
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; text-transform: capitalize; }
        .feliz { background: #22c55e; } .ansiedad { background: #f59e0b; } .tristeza { background: #a855f7; } .enojo { background: #ef4444; } .desmotivado { background: #64748b; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div style='font-size: 50px; margin-bottom: 20px;'>⏳</div>
        <h2>Verificando credenciales...</h2>
    </div>

    <div id="panel-contenido">
        
        <div class="sidebar-usuarios">
            <div class="sidebar-header">
                <h2>Mis Pacientes</h2>
                <input type="text" id="buscador-usuarios" class="buscador-input" placeholder="Buscar por nombre o correo...">
            </div>
            <div class="lista-usuarios-contenedor" id="lista-usuarios"></div>
        </div>

        <div class="main-panel">
            <div class="estado-vacio" id="estado-vacio">
                <span>📂</span>
                <h2>Selecciona un paciente</h2>
                <p>Haz clic en un usuario de la izquierda</p>
            </div>

            <div id="detalle-paciente">
                
                <div class="paciente-header">
                    <img id="det-foto" src="" alt="Foto" referrerpolicy="no-referrer">
                    <div id="det-avatar-texto" class="user-avatar" style="width: 80px; height: 80px; font-size: 2rem; margin-right: 20px; display: none;"></div>
                    <div>
                        <h2 id="det-nombre" style="font-size: 1.5rem; margin-bottom: 5px;">Cargando...</h2>
                        <p id="det-correo" style="color: #64748b;">cargando@correo.com</p>
                    </div>
                </div>

                <div class="tabs-menu">
                    <button class="tab-btn activo" id="btn-tab-resumen">📊 Resumen General</button>
                    <button class="tab-btn" id="btn-tab-diario">📓 Diarios</button>
                    <button class="tab-btn" id="btn-tab-emociones">🎭 Emociones</button>
                </div>

                <div id="tab-resumen" class="tab-content activo">
                    <div class="resumen-grid">
                        <div class="resumen-card">
                            <h3>🐾 Nivel de Mascota</h3>
                            <div class="valor"><span id="det-mascota">--</span> <br><span style="font-size: 1rem; color: #3b82f6;" id="det-nivel">0%</span></div>
                        </div>
                        <div class="resumen-card">
                            <h3>🎭 Emoción Dominante</h3>
                            <div id="det-emocion" class="valor" style="margin-top: 10px;">--</div>
                        </div>
                        <div class="resumen-card">
                            <h3>⏱️ Última Conexión</h3>
                            <div id="det-conexion" class="valor" style="font-size: 1.1rem; margin-top: 10px;">--</div>
                        </div>
                    </div>
                </div>

                <div id="tab-diario" class="tab-content">
                    <div class="timeline-container">
                        <h3 style="margin-bottom: 20px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">📓 Historial de Diarios</h3>
                        <div id="timeline-diarios">Cargando...</div>
                    </div>
                </div>

                <div id="tab-emociones" class="tab-content">
                    <div class="timeline-container">
                        <h3 style="margin-bottom: 20px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">🎭 Historial de Emociones</h3>
                        <div id="timeline-emociones">Cargando...</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="admin.js?v=5"></script>
</body>
</html>
