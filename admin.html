<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Privado - Administrador</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; padding: 20px; color: #334155; margin: 0; }
        .bloqueo { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-size: 20px; color: #ef4444; font-weight: bold; text-align: center; }
        .contenido { display: none; max-width: 1000px; margin: 0 auto; } /* Oculto hasta validar correo */
        h1 { color: #4338ca; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h2 { color: #475569; margin-top: 30px; }
        .tabla-contenedor { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #4f46e5; color: white; padding: 15px; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f1f5f9; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 9999px; font-size: 12px; font-weight: bold; background: #e0e7ff; color: #4338ca; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo" class="bloqueo">
        <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
        Verificando credenciales de administrador...
    </div>

    <div id="panel-contenido" class="contenido">
        <h1>📊 Panel Maestro de Pacientes</h1>
        
        <h2>📔 Diarios Registrados</h2>
        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Usuario (Correo)</th>
                        <th>Fecha</th>
                        <th>Contenido del Diario</th>
                    </tr>
                </thead>
                <tbody id="tabla-diarios">
                    <tr><td colspan='3' style="text-align: center;">Cargando diarios... ⏳</td></tr>
                </tbody>
            </table>
        </div>

        <h2>📈 Registro Global de Emociones</h2>
        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Usuario (Correo)</th>
                        <th>Emoción Registrada</th>
                        <th>Fecha del Registro</th>
                    </tr>
                </thead>
                <tbody id="tabla-emociones">
                    <tr><td colspan='3' style="text-align: center;">Cargando emociones... ⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
