<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - ALEGRIA</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234facfe'/%3E%3Cstop offset='100%25' stop-color='%2300f2fe'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23g)'/%3E%3Cpath d='M35,65 Q35,45 50,45 Q65,45 65,65' stroke='white' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M50,45 Q40,30 50,20 Q60,30 50,45' fill='%2366bb6a'/%3E%3Cpath d='M50,35 Q35,30 40,20 Q50,28 50,35' fill='%2381c784'/%3E%3Cpath d='M50,35 Q65,30 60,20 Q50,28 50,35' fill='%2381c784'/%3E%3Ccircle cx='50' cy='52' r='3' fill='white'/%3E%3C/svg%3E">
    <style>
        /* Fondo general suave y centrado */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* La tarjeta blanca donde van los botones */
        .tarjeta-login {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 340px;
            width: 90%;
        }

        /* Títulos y textos amigables */
        .tarjeta-login h2 {
            margin-top: 0;
            color: #1565c0;
            font-size: 24px;
        }

        .tarjeta-login p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Estilo base de los botones */
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Botón de Google */
        .btn-google {
            background-color: #ffffff;
            color: #444;
            border: 2px solid #eeeeee;
        }
        
        .btn-google:hover {
            background-color: #f9f9f9;
            border-color: #dddddd;
            transform: translateY(-2px);
        }

        /* Botón de Facebook */
        .btn-facebook {
            background-color: #1877F2;
            color: #ffffff;
        }

        .btn-facebook:hover {
            background-color: #166fe5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        /* Botón para regresar al chat anónimo */
        .btn-volver {
            margin-top: 20px;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .btn-volver:hover {
            color: #1565c0;
        }
    </style>
</head>
<body>

    <div class="tarjeta-login">
        <h2>Hola de nuevo 👋</h2>
        <p>Inicia sesión en <b>ALEGRIA</b> para guardar tu progreso, tus reflexiones y seguir justo donde lo dejaste.</p>

        <button class="btn-social btn-google" id="btn-google-login">
            Continuar con Google
        </button>
        <button class="btn-social btn-facebook">
            Continuar con Facebook
        </button>

        <a href="index.html" class="btn-volver">Volver al chat sin registrarme</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // IMPORTAMOS FIRESTORE PARA PODER GUARDAR LA FOTO
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tus credenciales de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCXRaqSetEKHEn3-AIhK3XalDEPJ8vhUfE",
            authDomain: "alegria-web-977ea.firebaseapp.com",
            projectId: "alegria-web-977ea",
            storageBucket: "alegria-web-977ea.firebasestorage.app",
            messagingSenderId: "561418892075",
            appId: "1:561418892075:web:133a1ff3948b86a4e88b6e"
        };

        // Inicializamos Firebase, la Autenticación y Firestore
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 1. OBSERVADOR DE SESIÓN: Si detecta que ya iniciaste sesión, te lleva al inicio de inmediato.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        // 2. ACCIÓN DE CLIC: Buscamos el boton de Google y abrimos la ventana
        const botonGoogle = document.getElementById('btn-google-login');
        if (botonGoogle) {
            botonGoogle.addEventListener('click', () => {
                signInWithPopup(auth, provider)
                    .then(async (result) => {
                        const user = result.user;
                        
                        try {
                            // AQUÍ GUARDAMOS LA FOTO Y DATOS EN LA BASE DE DATOS
                            await setDoc(doc(db, "usuarios", user.uid), {
                                nombre: user.displayName,
                                correo: user.email,
                                foto: user.photoURL // <--- ESTO GUARDA LA FOTO
                            }, { merge: true }); // Merge true evita que se borre su progreso de mascota
                            
                            console.log("Sesión exitosa y datos guardados:", user.displayName);
                        } catch (error) {
                            console.error("Error al guardar datos del usuario:", error);
                        }
                        
                    })
                    .catch((error) => {
                        console.error("Error al iniciar sesión:", error);
                        alert("Ocurrió un inconveniente al conectar con Google. Inténtalo de nuevo.");
                    });
            });
        }
    </script>
    <script>
  // Bloquear el menú del clic derecho
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // Bloquear atajos de teclado para inspeccionar (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
  document.addEventListener('keydown', function(e) {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
      (e.ctrlKey && e.key === 'u')
    ) {
      e.preventDefault();
    }
  });
</script>
</body>
</html>
